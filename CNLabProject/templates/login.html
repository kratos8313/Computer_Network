{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
        <h1 style="margin-bottom: 30px;">Parental Login</h1>
        <form method="POST">
            <div style="margin-bottom: 20px;">
                <input type="password" name="password" placeholder="Enter Parent Password" style="width: 100%; box-sizing: border-box;" required autofocus>
            </div>
            <button type="submit" style="width: 100%;">Unlock Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
