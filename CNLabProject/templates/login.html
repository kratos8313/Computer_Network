{% extends "base.html" %}
{% block login_content %}
<div class="glass-card rounded-2xl p-8 w-full shadow-xl">
    <div class="flex justify-center mb-6">
        <div class="p-3 bg-primary-100 rounded-xl text-primary-600">
            <i data-lucide="shield" class="w-8 h-8"></i>
        </div>
    </div>
    <h1 class="text-2xl font-bold text-center text-slate-800 mb-2">Welcome Back</h1>
    <p class="text-center text-slate-500 mb-8 text-sm">Enter the parental password to access the dashboard</p>
    
    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">Admin Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                    <i data-lucide="lock" class="w-5 h-5"></i>
                </div>
                <input type="password" name="password" placeholder="••••••••" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition-shadow outline-none text-slate-900 bg-white" required autofocus>
            </div>
        </div>
        <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
            Unlock Dashboard
        </button>
    </form>
</div>
{% endblock %}
